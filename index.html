<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iLoveRunn Hub</title>
<style>
body{font-family:Arial;background:#0a0a0a;color:#fff;margin:0;padding:20px}
.card{background:#1a1a1a;padding:15px;margin-bottom:10px;border-radius:10px;cursor:pointer}
img{width:100%;border-radius:8px;margin-bottom:10px}
button{padding:10px;margin-top:10px}
</style>
</head>
<body>

<h2>Carreras</h2>
<div id="list">Cargando...</div>

<script>
const SHEET = "https://docs.google.com/spreadsheets/d/1986kmKPGp_JQcEdsLM3TBTGWTLWYfMQfnkmWZmIjrzw/export?format=csv";

function parseCSV(text){
  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];
  return rows.slice(1).map(r=>{
    let obj={};
    headers.forEach((h,i)=>obj[h.trim()]=r[i]);
    return obj;
  });
}

function render(data){
  const list = document.getElementById("list");
  list.innerHTML="";
  data.forEach(e=>{
    if(e.activo !== "TRUE") return;

    let img = e.imagen_url || "";
    if(img.includes("drive.google.com")){
      const id = img.split("/d/")[1]?.split("/")[0];
      img = "https://drive.google.com/uc?export=view&id="+id;
    }

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      ${img ? `<img src="${img}" onerror="this.style.display='none'">` : ""}
      <h3>${e.nombre || "Evento"}</h3>
      <p>${e.fecha || ""}</p>
      <button onclick="alert('${e.descripcion || ""}')">Ver</button>
    `;
    list.appendChild(div);
  });
}

fetch(SHEET)
  .then(r=>r.text())
  .then(t=>parseCSV(t))
  .then(d=>render(d))
  .catch(()=>document.getElementById("list").innerText="Error cargando datos");
</script>

</body>
</html>
